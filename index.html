<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ZOMBIE DEFENSE - Ultimate Edition</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif;-webkit-user-select:none;user-select:none}
#game{display:block;touch-action:none}
canvas{display:block;pointer-events:none}
#menu{position:fixed;inset:0;background:radial-gradient(circle at 50% 30%,#1a0505,#000);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
.menu-bg{position:absolute;inset:0;overflow:hidden}
.menu-bg::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(255,0,0,.08),transparent 70%)}
.menu-title{font-size:clamp(40px,10vw,80px);font-weight:900;color:#ff2222;text-shadow:0 0 40px #f00,0 0 80px #f00,0 4px 0 #600;letter-spacing:8px;z-index:1;animation:glow 3s ease-in-out infinite}
.menu-sub{font-size:clamp(14px,2.5vw,20px);color:#888;letter-spacing:10px;text-transform:uppercase;z-index:1;margin-bottom:50px}
@keyframes glow{0%,100%{text-shadow:0 0 40px #f00,0 0 80px #f00,0 4px 0 #600}50%{text-shadow:0 0 60px #f00,0 0 120px #f00,0 4px 0 #600}}
.menu-btn{font-size:clamp(18px,3vw,24px);font-weight:700;padding:20px 60px;margin:10px;background:linear-gradient(180deg,#2a1010,#1a0808);color:#ff4444;border:2px solid #ff333366;border-radius:8px;cursor:pointer;transition:all .2s;letter-spacing:3px;text-transform:uppercase;z-index:1;position:relative;overflow:hidden}
.menu-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,0,0,.1),transparent);transform:translateX(-100%);transition:transform .5s}
.menu-btn:hover::before{transform:translateX(100%)}
.menu-btn:hover{background:linear-gradient(180deg,#441515,#2a0a0a);border-color:#ff3333;transform:scale(1.05);box-shadow:0 0 30px #f0000060}
.menu-info{margin-top:40px;color:#555;text-align:center;font-size:clamp(11px,2vw,14px);line-height:2.2;z-index:1}
.menu-info span{color:#999}
#hud{position:fixed;inset:0;pointer-events:none;z-index:500;display:none}
.hud-panel{position:absolute;background:rgba(0,0,0,.85);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px 14px}
.hud-tl{top:10px;left:10px}
.hud-tr{top:10px;right:10px;pointer-events:all}
.hud-tc{top:10px;left:50%;transform:translateX(-50%)}
.hud-label{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;display:flex;justify-content:space-between}
.hud-val{font-size:13px;font-weight:700;color:#fff}
.bar{width:180px;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-top:3px}
.bar-fill{height:100%;border-radius:3px;transition:width .3s}
.bar-hp{background:linear-gradient(90deg,#ff3333,#ff6666)}
.bar-base{background:linear-gradient(90deg,#3388ff,#66aaff)}
.wave-badge{font-size:14px;font-weight:700;color:#fff;text-align:center;letter-spacing:2px}
.wave-badge .n{color:#ff4444;font-size:18px}
.wave-timer{font-size:11px;color:#ffaa00;margin-top:4px;text-align:center}
.money{font-size:18px;font-weight:700;color:#ffcc00;display:flex;align-items:center;gap:8px}
.kills{font-size:11px;color:#777;margin-left:8px}
.weapon-info{font-size:11px;color:#aaa;margin-top:6px;text-align:center}
#shop{position:fixed;top:50px;right:10px;width:230px;max-height:calc(100vh - 60px);overflow-y:auto;background:rgba(8,8,12,.94);border:1px solid rgba(255,255,255,.08);border-radius:10px;display:none;pointer-events:all;z-index:600}
#shop::-webkit-scrollbar{width:4px}
#shop::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.shop-hdr{padding:12px;border-bottom:1px solid rgba(255,255,255,.08);font-size:13px;font-weight:700;color:#ff4444;letter-spacing:2px;text-transform:uppercase;text-align:center}
.shop-sec{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.04)}
.shop-title{font-size:10px;font-weight:700;color:#666;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.shop-btn{display:flex;align-items:center;width:100%;padding:8px;margin:3px 0;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:6px;color:#bbb;font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;gap:8px}
.shop-btn:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15);color:#fff}
.shop-btn .ic{font-size:16px;width:22px;text-align:center}
.shop-btn .nm{flex:1}
.shop-btn .cs{color:#ffcc00;font-weight:700;font-size:10px}
#announce{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:900;opacity:0;transition:opacity .4s}
.ann-txt{font-size:clamp(48px,12vw,80px);font-weight:900;color:#ff2222;text-shadow:0 0 40px #f00,0 0 80px #f00;letter-spacing:6px}
.ann-sub{font-size:clamp(16px,3vw,24px);color:#ff8888;margin-top:8px;font-weight:600}
#gameover{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;z-index:9999}
.go-title{font-size:clamp(48px,10vw,80px);font-weight:900;color:#ff2222;text-shadow:0 0 40px #f00;letter-spacing:6px}
.go-stats{color:#888;font-size:18px;margin-top:20px;text-align:center;line-height:2}
.go-restart{color:#ff4444;font-size:20px;margin-top:30px;font-weight:700;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
#placebar{position:fixed;bottom:0;left:0;right:0;display:none;justify-content:center;align-items:center;gap:12px;padding:12px;background:linear-gradient(transparent,rgba(0,0,0,.7));pointer-events:none;z-index:800}
#placebar>*{pointer-events:all}
.place-info{color:#ffcc00;font-size:14px;font-weight:700}
.place-btn{padding:12px 28px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;border:2px solid;transition:all .15s}
.place-btn:active{transform:scale(.93)}
.ok{background:rgba(0,180,0,.3);border-color:#0c0;color:#0f0}
.cancel{background:rgba(180,0,0,.3);border-color:#c00;color:#f44}
#pickup{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);border:1px solid #ffcc00;border-radius:8px;padding:8px 16px;color:#ffcc00;font-size:13px;font-weight:600;display:none;pointer-events:none;z-index:600}
#minimap-wrap{position:fixed;bottom:10px;left:10px;border:2px solid rgba(255,255,255,.12);border-radius:8px;overflow:hidden;pointer-events:none;z-index:500;box-shadow:0 4px 15px rgba(0,0,0,.5)}
#joy{position:fixed;bottom:20px;left:20px;width:130px;height:130px;background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.12);border-radius:50%;display:none;pointer-events:all;z-index:800}
#stick{width:55px;height:55px;background:radial-gradient(circle,rgba(255,255,255,.2),rgba(255,255,255,.08));border:2px solid rgba(255,255,255,.25);border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
#mbtn{position:fixed;bottom:20px;right:20px;display:none;flex-direction:column;gap:10px;pointer-events:all;z-index:800}
.mbtn{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;border:3px solid;cursor:pointer;-webkit-tap-highlight-color:transparent}
.mbtn-shoot{background:rgba(255,50,50,.15);border-color:rgba(255,100,100,.4);color:#ff6666}
.mbtn-weapon{background:rgba(50,100,255,.15);border-color:rgba(100,150,255,.4);color:#66aaff;width:52px;height:52px;font-size:20px}
.mbtn-shop{background:rgba(255,200,0,.15);border-color:rgba(255,200,0,.4);color:#ffcc00;width:52px;height:52px;font-size:20px}
#notif{position:fixed;top:60px;left:50%;transform:translateX(-50%);pointer-events:none;z-index:850;display:flex;flex-direction:column;align-items:center;gap:5px}
.notif{background:rgba(0,0,0,.9);border:2px solid;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:700;animation:slideIn .3s,fadeOut .5s 1.5s forwards;white-space:nowrap}
@keyframes slideIn{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeOut{to{opacity:0;transform:translateY(-10px)}}
#shield-ind{position:fixed;top:100px;left:50%;transform:translateX(-50%);background:rgba(50,100,255,.3);border:2px solid #4af;border-radius:20px;padding:5px 15px;color:#4af;font-size:12px;font-weight:700;display:none;z-index:600;pointer-events:none}
</style>
</head>
<body>
<div id="menu">
<div class="menu-bg"></div>
<div class="menu-title">ZOMBIE DEFENSE</div>
<div class="menu-sub">Ultimate Edition</div>
<button class="menu-btn" onclick="startGame()">▶ STARTEN</button>
<div class="menu-info">
<span>WASD</span> Bewegen · <span>Maus</span> Zielen · <span>Klick</span> Schießen<br>
<span>1-5</span> Waffen · <span>E</span> Aufheben · <span>Shop</span> rechts
</div>
</div>
<canvas id="game"></canvas>
<div id="hud">
<div class="hud-panel hud-tl">
<div class="hud-label"><span>❤️ HP</span><span class="hud-val" id="hp-val">100/100</span></div>
<div class="bar"><div class="bar-fill bar-hp" id="hp-bar" style="width:100%"></div></div>
<div class="hud-label" style="margin-top:8px"><span>🏠 Basis</span><span class="hud-val" id="base-val">1000/1000</span></div>
<div class="bar"><div class="bar-fill bar-base" id="base-bar" style="width:100%"></div></div>
</div>
<div class="hud-panel hud-tc">
<div class="wave-badge">WELLE <span class="n" id="wave-num">0</span></div>
<div class="wave-timer" id="wave-timer"></div>
<div class="weapon-info" id="weapon-info">🔫 Pistole</div>
</div>
<div class="hud-panel hud-tr">
<div class="money">💰 <span id="money-val">50</span><span class="kills" id="kills-val">💀 0</span></div>
</div>
</div>
<div id="shop">
<div class="shop-hdr">⚔️ SHOP</div>
<div class="shop-sec"><div class="shop-title">🏗️ Upgrades</div>
<button class="shop-btn" onclick="upgradeBase('hp')"><span class="ic">❤️</span><span class="nm">Basis HP +500</span><span class="cs">100</span></button>
<button class="shop-btn" onclick="upgradeBase('dmg')"><span class="ic">⚔️</span><span class="nm">Schaden +5</span><span class="cs">80</span></button>
<button class="shop-btn" onclick="upgradeBase('spd')"><span class="ic">🏃</span><span class="nm">Speed +0.5</span><span class="cs">120</span></button>
<button class="shop-btn" onclick="upgradeBase('fr')"><span class="ic">🔥</span><span class="nm">Feuerrate</span><span class="cs">150</span></button>
<button class="shop-btn" onclick="upgradeBase('reg')"><span class="ic">💚</span><span class="nm">Regen +1/s</span><span class="cs">200</span></button>
<button class="shop-btn" onclick="upgradeBase('rng')"><span class="ic">🎯</span><span class="nm">Reichweite</span><span class="cs">100</span></button>
</div>
<div class="shop-sec"><div class="shop-title">🤖 NPCs</div>
<button class="shop-btn" onclick="startPlace('gunner')"><span class="ic">🔫</span><span class="nm">Schütze</span><span class="cs">50</span></button>
<button class="shop-btn" onclick="startPlace('sniper')"><span class="ic">🎯</span><span class="nm">Sniper</span><span class="cs">120</span></button>
<button class="shop-btn" onclick="startPlace('shotgunner')"><span class="ic">💥</span><span class="nm">Shotgun</span><span class="cs">100</span></button>
<button class="shop-btn" onclick="startPlace('melee')"><span class="ic">⚔️</span><span class="nm">Nahkampf</span><span class="cs">70</span></button>
<button class="shop-btn" onclick="startPlace('freezer')"><span class="ic">❄️</span><span class="nm">Froster</span><span class="cs">150</span></button>
<button class="shop-btn" onclick="startPlace('healer')"><span class="ic">💚</span><span class="nm">Heiler</span><span class="cs">200</span></button>
<button class="shop-btn" onclick="startPlace('launcher')"><span class="ic">🚀</span><span class="nm">Rakete</span><span class="cs">250</span></button>
<button class="shop-btn" onclick="startPlace('tesla')"><span class="ic">⚡</span><span class="nm">Tesla</span><span class="cs">300</span></button>
</div>
<div class="shop-sec"><div class="shop-title">🏗️ Verteidigung</div>
<button class="shop-btn" onclick="startPlace('wall')"><span class="ic">🧱</span><span class="nm">Mauer</span><span class="cs">20</span></button>
<button class="shop-btn" onclick="startPlace('spike')"><span class="ic">🔺</span><span class="nm">Stachel</span><span class="cs">40</span></button>
<button class="shop-btn" onclick="startPlace('turret')"><span class="ic">🔫</span><span class="nm">Turm</span><span class="cs">180</span></button>
</div>
<div class="shop-sec"><div class="shop-title">💊 Items</div>
<button class="shop-btn" onclick="buyItem('heal')"><span class="ic">💊</span><span class="nm">Heilung +50</span><span class="cs">30</span></button>
<button class="shop-btn" onclick="buyItem('nuke')"><span class="ic">☢️</span><span class="nm">Atombombe</span><span class="cs">500</span></button>
<button class="shop-btn" onclick="buyItem('shield')"><span class="ic">🛡️</span><span class="nm">Schild 10s</span><span class="cs">100</span></button>
</div>
</div>
<div id="announce"><div class="ann-txt"></div><div class="ann-sub"></div></div>
<div id="gameover" onclick="restart()" ontouchstart="restart()"><div class="go-title">GAME OVER</div><div class="go-stats"></div><div class="go-restart">Tippe zum Neustarten</div></div>
<div id="placebar"><span class="place-info" id="placelabel"></span><button class="place-btn ok" onclick="confirmPlace()" ontouchstart="event.stopPropagation();confirmPlace()">✅ Platzieren</button><button class="place-btn cancel" onclick="cancelPlace()" ontouchstart="event.stopPropagation();cancelPlace()">❌ Abbrechen</button></div>
<div id="pickup">💰 Tippe zum Aufheben!</div>
<div id="minimap-wrap"><canvas id="minimap" width="160" height="160"></canvas></div>
<div id="joy"><div id="stick"></div></div>
<div id="mbtn">
<div class="mbtn mbtn-shoot" id="shootbtn">🔫</div>
<div style="display:flex;gap:8px">
<div class="mbtn mbtn-weapon" id="weaponbtn">🔄</div>
<div class="mbtn mbtn-shop" id="shopbtn">🛒</div>
</div>
</div>
<div id="notif"></div>
<div id="shield-ind">🛡️ Schild aktiv</div>

<script>
const C=document.getElementById('game'),X=C.getContext('2d');
const MC=document.getElementById('minimap'),MX=MC.getContext('2d');
function resize(){C.width=innerWidth;C.height=innerHeight}
resize();addEventListener('resize',resize);
const mob=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)||'ontouchstart'in window;
const WW=4000,WH=4000,BX=WW/2,BY=WH/2,BS=130;
let running=false,started=false,placing=null,mx=0,my=0,wmx=0,wmy=0,keys={},mdown=false;
let jAct=false,jSX=0,jSY=0,jX=0,jY=0,mShoot=false,cam={x:0,y:0};
let wave=0,waveOn=false,waveT=0,kills=0,dayTime=.3,shake=0,shieldTimer=0;
let nearPickup=null,ambTimer=0,placeX=BX,placeY=BY;
let P={x:BX,y:BY,r:18,spd:3.5,hp:100,mhp:100,ang:0,money:50,regen:0,weapon:'pistol',walk:0,ft:0,
wpn:{pistol:{dmg:15,fr:12,rng:300,sp:.05,bul:1,spd:12,nm:'Pistole'},rifle:{dmg:10,fr:5,rng:400,sp:.03,bul:1,spd:15,nm:'Gewehr'},shotgun:{dmg:8,fr:30,rng:200,sp:.2,bul:6,spd:10,nm:'Schrotflinte'},sniper:{dmg:50,fr:40,rng:600,sp:.01,bul:1,spd:20,nm:'Sniper'},minigun:{dmg:6,fr:2,rng:250,sp:.08,bul:1,spd:14,nm:'Minigun'}}};
let base={hp:1000,mhp:1000,lv:1};
let bul=[],zom=[],npc=[],bld=[],par=[],dmg=[],picks=[],trees=[],cityBld=[];
const nC={gunner:50,sniper:120,shotgunner:100,melee:70,freezer:150,healer:200,launcher:250,tesla:300,wall:20,spike:40,turret:180};
const nN={gunner:'Schütze',sniper:'Sniper',shotgunner:'Shotgun',melee:'Nahkampf',freezer:'Froster',healer:'Heiler',launcher:'Rakete',tesla:'Tesla',wall:'Mauer',spike:'Stachel',turret:'Turm'};
const wIcons={pistol:'🔫',rifle:'🔫',shotgun:'💥',sniper:'🎯',minigun:'🔥'};

// Audio
let ACtx;try{ACtx=new(window.AudioContext||window.webkitAudioContext)}catch(e){}
function playSound(freq,dur,type='sine',vol=.08){if(!ACtx)return;try{const o=ACtx.createOscillator(),g=ACtx.createGain();o.connect(g);g.connect(ACtx.destination);o.frequency.value=freq;o.type=type;g.gain.setValueAtTime(vol,ACtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ACtx.currentTime+dur);o.start();o.stop(ACtx.currentTime+dur)}catch(e){}}
function shootSnd(){playSound(300+Math.random()*200,.05,'square',.04)}
function hitSnd(){playSound(150,.08,'sawtooth',.06)}
function pickupSnd(){playSound(800,.08,'sine',.08);setTimeout(()=>playSound(1200,.08,'sine',.08),50)}
function boomSnd(){playSound(60,.3,'sawtooth',.12);playSound(40,.4,'square',.08)}

function notify(txt,color='#fff'){
  let n=document.createElement('div');n.className='notif';n.textContent=txt;n.style.borderColor=color;n.style.color=color;
  document.getElementById('notif').appendChild(n);setTimeout(()=>n.remove(),2500);
}

function genWorld(){
  trees=[];cityBld=[];picks=[];
  for(let i=0;i<350;i++){
    let x=Math.random()*WW,y=Math.random()*WH;
    if(Math.hypot(x-BX,y-BY)<250)continue;
    let t=Math.random();
    trees.push(t<.45?{x,y,type:'pine',r:18+Math.random()*12,h:40+Math.random()*30}:t<.8?{x,y,type:'oak',r:20+Math.random()*15,h:35+Math.random()*20}:{x,y,type:'dead',r:12+Math.random()*8,h:30+Math.random()*25});
  }
  let cities=[{cx:600,cy:600,n:'NORDSTADT'},{cx:WW-600,cy:600,n:'OSTSTADT'},{cx:600,cy:WH-600,n:'WESTSTADT'},{cx:WW-600,cy:WH-600,n:'SÜDSTADT'}];
  for(let c of cities){
    for(let i=0;i<5+Math.floor(Math.random()*4);i++){
      let bx=c.cx+Math.random()*350-175,by=c.cy+Math.random()*350-175;
      cityBld.push({x:bx,y:by,w:60+Math.random()*80,h:50+Math.random()*60,color:`hsl(${30+Math.random()*20},${10+Math.random()*15}%,${20+Math.random()*10}%)`,damage:Math.random(),windows:1+Math.floor(Math.random()*4),door:Math.random()<.6});
    }
    for(let i=0;i<12;i++)picks.push({x:c.cx+Math.random()*320-160,y:c.cy+Math.random()*320-160,val:5+Math.floor(Math.random()*25),type:'cash',bob:Math.random()*10});
  }
  for(let i=0;i<30;i++)picks.push({x:200+Math.random()*(WW-400),y:200+Math.random()*(WH-400),val:3+Math.floor(Math.random()*12),type:'cash',bob:Math.random()*10});
}

// Input
addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;
  if(e.key>='1'&&e.key<='5'){let w=['pistol','rifle','shotgun','sniper','minigun'];P.weapon=w[+e.key-1]}
  if(e.key.toLowerCase()==='e')tryPickup();
});
addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;if(!mob)uwm()});
addEventListener('mousedown',e=>{if(e.button===0){mdown=true;if(!running&&started)restart();else if(placing&&!mob)movePlace()}if(e.button===2)cancelPlace()});
addEventListener('mouseup',e=>{if(e.button===0)mdown=false});
addEventListener('contextmenu',e=>e.preventDefault());
let tSI=null;
C.addEventListener('touchstart',e=>{e.preventDefault();for(let t of e.changedTouches)if(t.clientX>=innerWidth*.4&&!tSI){tSI=t.identifier;mShoot=true;mx=t.clientX;my=t.clientY;uwm()}},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();for(let t of e.changedTouches)if(t.identifier===tSI){mx=t.clientX;my=t.clientY;uwm()}},{passive:false});
C.addEventListener('touchend',e=>{e.preventDefault();for(let t of e.changedTouches)if(t.identifier===tSI){tSI=null;mShoot=false}},{passive:false});
C.addEventListener('click',e=>{if(placing)movePlace();else if(nearPickup)tryPickup()});
const jB=document.getElementById('joy'),jS=document.getElementById('stick');
jB.addEventListener('touchstart',e=>{e.preventDefault();jAct=true;let r=jB.getBoundingClientRect();jSX=r.left+r.width/2;jSY=r.top+r.height/2},{passive:false});
jB.addEventListener('touchmove',e=>{e.preventDefault();if(!jAct)return;let t=e.touches[0],dx=t.clientX-jSX,dy=t.clientY-jSY,d=Math.hypot(dx,dy),m=40;if(d>m){dx=dx/d*m;dy=dy/d*m}jS.style.transform=`translate(calc(-50%+${dx}px),calc(-50%+${dy}px))`;jX=dx/m;jY=dy/m},{passive:false});
jB.addEventListener('touchend',e=>{e.preventDefault();jAct=false;jS.style.transform='translate(-50%,-50%)';jX=0;jY=0},{passive:false});
document.getElementById('shootbtn').addEventListener('touchstart',e=>{e.preventDefault();mShoot=true},{passive:false});
document.getElementById('shootbtn').addEventListener('touchend',e=>{e.preventDefault();mShoot=false},{passive:false});
document.getElementById('weaponbtn').addEventListener('touchstart',e=>{e.preventDefault();let w=['pistol','rifle','shotgun','sniper','minigun'];P.weapon=w[(w.indexOf(P.weapon)+1)%5]},{passive:false});
document.getElementById('shopbtn').addEventListener('touchstart',e=>{e.preventDefault();toggleShop()},{passive:false});
function uwm(){wmx=mx+cam.x;wmy=my+cam.y}

function startPlace(t){
  if(P.money<nC[t]){notify('Nicht genug Geld!','#f44');return}
  placing=t;placeX=P.x+Math.cos(P.ang)*80;placeY=P.y+Math.sin(P.ang)*80;
  document.getElementById('placebar').style.display='flex';
  document.getElementById('placelabel').textContent='▶ '+nN[t]+' ('+nC[t]+'💰)';
  if(ACtx&&ACtx.state==='suspended')ACtx.resume();
}
function movePlace(){if(!mob){placeX=wmx;placeY=wmy}else{placeX=P.x+Math.cos(P.ang)*100;placeY=P.y+Math.sin(P.ang)*100}}
function confirmPlace(){
  if(!placing)return;let c=nC[placing];if(P.money<c)return;
  if(placing==='wall')bld.push({t:'wall',x:placeX,y:placeY,w:50,h:25,hp:200,mhp:200,ang:P.ang});
  else if(placing==='spike')bld.push({t:'spike',x:placeX,y:placeY,r:30,hp:100,mhp:100,dmg:5});
  else if(placing==='turret')npc.push({t:'turret',x:placeX,y:placeY,r:18,hp:150,mhp:150,dmg:12,fr:8,ft:0,rng:250,ang:0,walk:0});
  else npc.push({t:placing,x:placeX,y:placeY,r:16,hp:80,mhp:80,dmg:gD(placing),fr:gF(placing),ft:0,rng:gR(placing),ang:0,spd:gS(placing),walk:0});
  P.money-=c;cancelPlace();notify(nN[placing]+' platziert!','#4f4');pickupSnd();
}
function cancelPlace(){placing=null;document.getElementById('placebar').style.display='none'}

function tryPickup(){
  if(!nearPickup)return;P.money+=nearPickup.val;
  sD(nearPickup.x,nearPickup.y-10,nearPickup.val,'#ffcc00');
  sP(nearPickup.x,nearPickup.y,'#ff0',8);pickupSnd();
  let i=picks.indexOf(nearPickup);if(i>=0)picks.splice(i,1);
  nearPickup=null;document.getElementById('pickup').style.display='none';
}

function gD(t){return{gunner:8,sniper:25,shotgunner:5,melee:15,freezer:3,healer:0,launcher:30,tesla:15,turret:12}[t]||10}
function gF(t){return{gunner:15,sniper:40,shotgunner:25,melee:20,freezer:20,healer:60,launcher:50,tesla:30,turret:8}[t]||15}
function gR(t){return{gunner:200,sniper:450,shotgunner:120,melee:40,freezer:180,healer:150,launcher:300,tesla:200,turret:250}[t]||200}
function gS(t){return{melee:2.5,healer:1.5}[t]||0}

function upgradeBase(s){
  const c={hp:100,dmg:80,spd:120,fr:150,reg:200,rng:100};
  if(P.money<c[s]){notify('Nicht genug Geld!','#f44');return}
  P.money-=c[s];
  if(s==='hp'){P.mhp+=50;P.hp+=50}
  if(s==='dmg')Object.keys(P.wpn).forEach(w=>P.wpn[w].dmg+=5);
  if(s==='spd')P.spd+=.5;
  if(s==='fr')Object.keys(P.wpn).forEach(w=>P.wpn[w].fr=Math.max(2,P.wpn[w].fr*.85|0));
  if(s==='reg')P.regen++;
  if(s==='rng')Object.keys(P.wpn).forEach(w=>P.wpn[w].rng+=50);
  base.lv++;notify('Upgrade erfolgreich!','#4f4');
}
function buyItem(i){
  if(i==='heal'&&P.money>=30){P.money-=30;P.hp=Math.min(P.mhp,P.hp+50);notify('+50 HP!','#4f4');pickupSnd()}
  if(i==='nuke'&&P.money>=500){P.money-=500;zom.forEach(z=>{z.hp-=150;sP(z.x,z.y,'#ff0',10)});sP(P.x,P.y,'#fff',50);shake=25;boomSnd();notify('☢️ ATOMBOMBE!','#f80')}
  if(i==='shield'&&P.money>=100){P.money-=100;shieldTimer=600;notify('🛡️ Schild aktiv!','#4af');pickupSnd()}
}

const zT={normal:{hp:30,spd:1.2,dmg:5,r:15,c:'#5a5',m:5},fast:{hp:15,spd:2.8,dmg:3,r:13,c:'#a4a',m:7},tank:{hp:120,spd:.7,dmg:15,r:24,c:'#664',m:15},spitter:{hp:25,spd:1,dmg:8,r:14,c:'#a84',m:10,rng:1},exploder:{hp:40,spd:1.5,dmg:25,r:18,c:'#a44',m:12,er:60},ghost:{hp:20,spd:1.8,dmg:6,r:14,c:'#88f',m:10,gh:1},boss:{hp:500,spd:.5,dmg:30,r:35,c:'#f44',m:100},swarm:{hp:10,spd:2.2,dmg:2,r:10,c:'#8a4',m:3},armored:{hp:80,spd:.9,dmg:10,r:18,c:'#888',m:15,ar:.5}};

function spawnWave(){
  wave++;waveOn=true;let cnt=5+wave*3,hm=1+wave*.15;
  let el=document.getElementById('announce');
  el.querySelector('.ann-txt').textContent='WELLE '+wave;
  el.querySelector('.ann-sub').textContent=cnt+' Zombies!';
  el.style.opacity=1;setTimeout(()=>el.style.opacity=0,2500);
  let sp=0,si=setInterval(()=>{
    if(sp>=cnt||!running){clearInterval(si);return}
    let types=['normal'];
    if(wave>=2)types.push('fast','fast');if(wave>=3)types.push('tank');
    if(wave>=4)types.push('spitter');if(wave>=5)types.push('exploder');
    if(wave>=6)types.push('ghost');if(wave>=7)types.push('swarm','swarm','swarm');
    if(wave>=8)types.push('armored');
    let t=types[Math.random()*types.length|0],zt=zT[t];
    let a=Math.random()*Math.PI*2,d=600+Math.random()*200;
    let sx=Math.max(50,Math.min(WW-50,P.x+Math.cos(a)*d)),sy=Math.max(50,Math.min(WH-50,P.y+Math.sin(a)*d));
    zom.push({t,x:sx,y:sy,hp:zt.hp*hm,mhp:zt.hp*hm,spd:zt.spd,dmg:zt.dmg,r:zt.r,c:zt.c,m:zt.m,ang:0,walk:Math.random()*10,rng:zt.rng||0,er:zt.er||0,gh:zt.gh||0,ar:zt.ar||0,ht:0,at:0,sl:0,sm:1});
    if(wave%5===0&&sp===0){let bt=zT.boss;zom.push({t:'boss',x:sx+50,y:sy,hp:bt.hp*hm*1.5,mhp:bt.hp*hm*1.5,spd:bt.spd*1.2,dmg:bt.dmg*1.5,r:bt.r*1.3,c:bt.c,m:bt.m*2,ang:0,walk:0,ht:0,at:0,sl:0,sm:1});notify('💀 BOSS ZOMBIE!','#f44');boomSnd()}
    sp++;
  },400);
}

function ambientSpawn(){
  ambTimer++;if(ambTimer%180!==0||zom.length>=25)return;
  let cities=[{cx:600,cy:600},{cx:WW-600,cy:600},{cx:600,cy:WH-600},{cx:WW-600,cy:WH-600}];
  let city=cities[Math.floor(Math.random()*cities.length)];
  for(let i=0;i<1+Math.floor(Math.random()*2);i++){
    let sx=city.cx+Math.random()*200-100,sy=city.cy+Math.random()*200-100;
    let types=['normal','normal','fast','swarm'],t=types[Math.floor(Math.random()*types.length)],zt=zT[t];
    zom.push({t,x:sx,y:sy,hp:zt.hp,mhp:zt.hp,spd:zt.spd*.8,dmg:zt.dmg,r:zt.r,c:zt.c,m:zt.m,ang:Math.random()*6.28,walk:Math.random()*10,rng:0,er:0,gh:0,ar:0,ht:0,at:0,sl:0,sm:1,ambient:true});
  }
}

function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function sP(x,y,c,n){for(let i=0;i<n;i++)par.push({x,y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6,l:30+Math.random()*20,c,r:2+Math.random()*3})}
function sD(x,y,d,c='#ff0'){dmg.push({x,y,t:Math.round(d)+'',l:45,c,vy:-1.5})}
function shoot(s,a,d,rng,spd,sp){let an=a+(Math.random()-.5)*sp;bul.push({x:s.x+Math.cos(an)*22,y:s.y+Math.sin(an)*22,vx:Math.cos(an)*spd,vy:Math.sin(an)*spd,d,rng,tr:0,fr:s===P||npc.includes(s)});if(s===P)shootSnd()}
function hitTree(x,y,r){for(let t of trees)if(t.type!=='dead'&&dist({x,y},t)<t.r*.5+r)return true;return false}
function hitCity(x,y,r){for(let b of cityBld)if(x+r>b.x&&x-r<b.x+b.w&&y+r>b.y&&y-r<b.y+b.h)return true;return false}

function update(){
  if(!running)return;
  if(!mob)uwm();
  dayTime=(dayTime+.00005)%1;
  if(shieldTimer>0){shieldTimer--;document.getElementById('shield-ind').style.display='block'}
  else document.getElementById('shield-ind').style.display='none';
  if(shake>0)shake--;
  if(placing&&mob){placeX=P.x+Math.cos(P.ang)*100;placeY=P.y+Math.sin(P.ang)*100}
  let dx=jAct?jX:0,dy=jAct?jY:0;
  if(keys.w||keys.arrowup)dy-=1;if(keys.s||keys.arrowdown)dy+=1;
  if(keys.a||keys.arrowleft)dx-=1;if(keys.d||keys.arrowright)dx+=1;
  let mv=dx!==0||dy!==0;
  if(mv){let l=Math.hypot(dx,dy);let nx=P.x+dx/l*P.spd,ny=P.y+dy/l*P.spd;
    if(!hitTree(nx,ny,P.r)&&!hitCity(nx,ny,P.r)){P.x=nx;P.y=ny}
    else if(!hitTree(nx,P.y,P.r)&&!hitCity(nx,P.y,P.r))P.x=nx;
    else if(!hitTree(P.x,ny,P.r)&&!hitCity(P.x,ny,P.r))P.y=ny;
    P.walk+=.2}
  P.x=Math.max(20,Math.min(WW-20,P.x));P.y=Math.max(20,Math.min(WH-20,P.y));
  if((mob&&tSI)||!mob)P.ang=Math.atan2(wmy-P.y,wmx-P.x);else if(mv)P.ang=Math.atan2(dy,dx);
  if(P.ft>0)P.ft--;
  if((mob?mShoot:mdown)&&P.ft<=0&&!placing){let w=P.wpn[P.weapon];for(let i=0;i<w.bul;i++)shoot(P,P.ang,w.dmg,w.rng,w.spd,w.sp);P.ft=w.fr}
  if(P.regen>0&&P.hp<P.mhp)P.hp=Math.min(P.mhp,P.hp+P.regen/60);
  cam.x=P.x-C.width/2;cam.y=P.y-C.height/2;
  nearPickup=null;for(let pk of picks)if(dist(P,pk)<45){nearPickup=pk;break}
  document.getElementById('pickup').style.display=nearPickup?'block':'none';
  if(!waveOn){waveT--;if(waveT<=0){spawnWave();waveT=600}}
  else if(zom.filter(z=>!z.ambient).length===0){waveOn=false;waveT=600}
  let wt=document.getElementById('wave-timer');
  if(!waveOn&&waveT>0)wt.textContent='Nächste Welle: '+Math.ceil(waveT/60)+'s';else wt.textContent=zom.length>0?'🧟 '+zom.length:'';
  ambientSpawn();
  // Bullets
  for(let i=bul.length-1;i>=0;i--){
    let b=bul[i];b.x+=b.vx;b.y+=b.vy;b.tr+=Math.hypot(b.vx,b.vy);
    if(b.tr>b.rng||b.x<0||b.x>WW||b.y<0||b.y>WH){bul.splice(i,1);continue}
    if(hitTree(b.x,b.y,3)){sP(b.x,b.y,'#4a3',2);bul.splice(i,1);continue}
    if(b.fr){for(let j=zom.length-1;j>=0;j--){let z=zom[j];if(dist(b,z)<z.r+4){let d=b.d;if(z.ar)d*=(1-z.ar);z.hp-=d;z.ht=6;sD(z.x,z.y-z.r,d);sP(b.x,b.y,z.c,3);hitSnd();bul.splice(i,1);break}}}
    else{if(shieldTimer>0&&dist(b,P)<P.r+12){sP(b.x,b.y,'#4af',5);bul.splice(i,1);continue}if(dist(b,P)<P.r+4){P.hp-=b.d;sD(P.x,P.y-P.r,b.d,'#f44');shake=5;bul.splice(i,1);continue}for(let n of npc)if(dist(b,n)<n.r+4){n.hp-=b.d;bul.splice(i,1);break}}
  }
  // Zombies
  for(let i=zom.length-1;i>=0;i--){
    let z=zom[i];if(z.ht>0)z.ht--;if(z.sl>0)z.sl--;else z.sm=1;
    if(z.hp<=0){P.money+=z.m;kills++;sP(z.x,z.y,z.c,12);
      if(Math.random()<.5)picks.push({x:z.x+Math.random()*10-5,y:z.y+Math.random()*10-5,val:z.m,type:'cash',bob:0});
      if(z.er){sP(z.x,z.y,'#f80',30);if(dist(z,P)<z.er)P.hp-=z.dmg;npc.forEach(n=>{if(dist(z,n)<z.er)n.hp-=z.dmg*.5});shake=12;boomSnd()}
      zom.splice(i,1);continue}
    let td=dist(z,P),tg=P,bd=Math.max(Math.abs(z.x-BX)-BS/2,Math.abs(z.y-BY)-BS/2);
    if(bd<td){td=bd;tg={x:BX,y:BY,r:BS/2}}
    if(z.ambient&&td>400){z.walk+=.05;z.x+=Math.cos(z.ang)*z.spd*.3;z.y+=Math.sin(z.ang)*z.spd*.3;if(Math.random()<.02)z.ang+=Math.random()*2-1;continue}
    let blk=false;
    for(let b of bld){if(b.t==='wall'&&dist(z,b)<30+z.r){blk=true;if(z.at<=0){b.hp-=z.dmg;z.at=30;sP(b.x,b.y,'#aa8',3)}break}if(b.t==='spike'&&dist(z,b)<b.r+z.r){z.hp-=b.dmg;z.sl=30;z.sm=.5}}
    for(let t of trees)if(t.type!=='dead'&&dist(z,t)<t.r*.5+z.r){let a=Math.atan2(z.y-t.y,z.x-t.x);z.x+=Math.cos(a)*2;z.y+=Math.sin(a)*2}
    if(!blk){let a=Math.atan2(tg.y-z.y,tg.x-z.x);z.ang=a;let s=z.spd*z.sm;
      let nx=z.x+Math.cos(a)*s,ny=z.y+Math.sin(a)*s;
      if(!hitCity(nx,ny,z.r)){z.x=nx;z.y=ny}else{if(!hitCity(z.x+Math.cos(a+1)*s,z.y+Math.sin(a+1)*s,z.r)){z.x+=Math.cos(a+1)*s;z.y+=Math.sin(a+1)*s}else if(!hitCity(z.x+Math.cos(a-1)*s,z.y+Math.sin(a-1)*s,z.r)){z.x+=Math.cos(a-1)*s;z.y+=Math.sin(a-1)*s}}
      z.walk+=.15*s;
      if(z.rng&&dist(z,P)<250&&z.at<=0){let a2=Math.atan2(P.y-z.y,P.x-z.x);bul.push({x:z.x,y:z.y,vx:Math.cos(a2)*5,vy:Math.sin(a2)*5,d:z.dmg,rng:300,tr:0,fr:false});z.at=60}
      if(dist(z,tg)<tg.r+z.r+5&&z.at<=0){if(tg===P){if(shieldTimer<=0){P.hp-=z.dmg;sD(P.x,P.y-P.r,z.dmg,'#f44');shake=3}else sP(P.x,P.y,'#4af',5)}else{base.hp-=z.dmg;sD(BX,BY-BS/2,z.dmg,'#f44')}z.at=40}}
    if(z.at>0)z.at--;
    for(let j=i+1;j<zom.length;j++){let z2=zom[j],d=dist(z,z2);if(d<z.r+z2.r&&d>0){let o=(z.r+z2.r-d)/2,ax=(z2.x-z.x)/d*o,ay=(z2.y-z.y)/d*o;z.x-=ax;z.y-=ay;z2.x+=ax;z2.y+=ay}}
  }
  // NPCs
  for(let i=npc.length-1;i>=0;i--){
    let n=npc[i];if(n.hp<=0){sP(n.x,n.y,'#fff',12);npc.splice(i,1);continue}if(n.ft>0)n.ft--;
    let cl=null,cd=1e9;for(let z of zom){let d=dist(n,z);if(d<cd){cd=d;cl=z}}
    if(cl)n.ang=Math.atan2(cl.y-n.y,cl.x-n.x);
    if(n.t==='healer'){if(n.ft<=0){if(dist(n,P)<n.rng&&P.hp<P.mhp){P.hp=Math.min(P.mhp,P.hp+2);sP(P.x,P.y,'#4f4',3)}n.ft=n.fr}}
    else if(n.t==='tesla'&&n.ft<=0&&cl&&cd<n.rng){cl.hp-=n.dmg;cl.ht=6;sD(cl.x,cl.y,n.dmg,'#aaf');sP(cl.x,cl.y,'#aaf',5);n.ft=n.fr}
    else if(n.t==='melee'){if(cl&&cd<40&&n.ft<=0){cl.hp-=n.dmg;cl.ht=6;sD(cl.x,cl.y,n.dmg);n.ft=n.fr}else if(cl&&cd<n.rng){n.x+=Math.cos(n.ang)*n.spd;n.y+=Math.sin(n.ang)*n.spd;n.walk+=.2}}
    else if(n.t==='freezer'&&n.ft<=0){for(let z of zom)if(dist(n,z)<n.rng){z.sl=60;z.sm=.3;z.hp-=n.dmg;sP(z.x,z.y,'#8df',3)}n.ft=n.fr}
    else if(n.ft<=0&&cl&&cd<n.rng){let a=n.ang;if(n.t==='shotgunner')for(let s=0;s<4;s++){let sa=a+(Math.random()-.5)*.4;bul.push({x:n.x+Math.cos(sa)*20,y:n.y+Math.sin(sa)*20,vx:Math.cos(sa)*9,vy:Math.sin(sa)*9,d:n.dmg,rng:n.rng,tr:0,fr:true})}else bul.push({x:n.x+Math.cos(a)*20,y:n.y+Math.sin(a)*20,vx:Math.cos(a)*(n.t==='sniper'?18:11),vy:Math.sin(a)*(n.t==='sniper'?18:11),d:n.dmg,rng:n.rng,tr:0,fr:true});n.ft=n.fr}
  }
  for(let i=bld.length-1;i>=0;i--)if(bld[i].hp<=0){sP(bld[i].x,bld[i].y,'#aa8',8);bld.splice(i,1)}
  for(let pk of picks)pk.bob+=.05;
  for(let i=par.length-1;i>=0;i--){let p=par[i];p.l--;if(p.l<=0){par.splice(i,1);continue}p.x+=p.vx;p.y+=p.vy;p.vx*=.95;p.vy*=.95}
  for(let i=dmg.length-1;i>=0;i--){let d=dmg[i];d.y+=d.vy;d.l--;if(d.l<=0)dmg.splice(i,1)}
  if(P.hp<=0||base.hp<=0){running=false;let go=document.getElementById('gameover');go.style.display='flex';go.querySelector('.go-stats').innerHTML='Welle: '+wave+'<br>Kills: '+kills+'<br>Geld: '+P.money}
  document.getElementById('hp-val').textContent=Math.round(P.hp)+'/'+P.mhp;
  document.getElementById('hp-bar').style.width=(P.hp/P.mhp*100)+'%';
  document.getElementById('base-val').textContent=Math.round(base.hp)+'/'+base.mhp;
  document.getElementById('base-bar').style.width=(base.hp/base.mhp*100)+'%';
  document.getElementById('wave-num').textContent=wave;
  document.getElementById('money-val').textContent=P.money;
  document.getElementById('kills-val').textContent='💀'+kills;
  document.getElementById('weapon-info').textContent=(wIcons[P.weapon]||'🔫')+' '+P.wpn[P.weapon].nm;
}

// === DRAW ===
function draw(){
  let nightAlpha=Math.max(0,Math.sin(dayTime*Math.PI*2))*0.35;
  X.fillStyle=`hsl(${120+Math.sin(dayTime*6.28)*10},${15+Math.sin(dayTime*6.28)*5}%,${12+Math.sin(dayTime*6.28)*4}%)`;
  X.fillRect(0,0,C.width,C.height);
  X.save();
  if(shake>0){X.translate((Math.random()-.5)*shake*1.5,(Math.random()-.5)*shake*1.5)}
  X.translate(-cam.x,-cam.y);
  // Ground
  let gs=200,gsx=Math.floor(cam.x/gs)*gs,gsy=Math.floor(cam.y/gs)*gs;
  X.fillStyle='rgba(30,50,28,.3)';
  for(let x=gsx;x<cam.x+C.width+gs;x+=gs)for(let y=gsy;y<cam.y+C.height+gs;y+=gs){
    let seed=(x*7+y*13)%100;if(seed<30){X.beginPath();X.arc(x+seed,y+seed*.5,20+seed*.3,0,Math.PI*2);X.fill()}}
  // Grid
  X.strokeStyle='rgba(30,50,28,.4)';X.lineWidth=.5;
  let gg=80,sx2=Math.floor(cam.x/gg)*gg,sy2=Math.floor(cam.y/gg)*gg;
  for(let x=sx2;x<cam.x+C.width+gg;x+=gg){X.beginPath();X.moveTo(x,cam.y);X.lineTo(x,cam.y+C.height);X.stroke()}

  X.fillStyle='#aaa';X.font='bold 10px Arial';X.fillText('LV '+base.lv,BX,BY+BS/2+14);

function drawTree(t){
  X.fillStyle='rgba(0,0,0,.2)';X.beginPath();X.ellipse(t.x+5,t.y+8,t.r*.8,t.r*.3,0,0,Math.PI*2);X.fill();

    X.fillStyle='#4a3520';X.fillRect(t.x-4,t.y-5,8,t.h*.4);
    for(let i=0;i<3;i++){let ly=t.y-10-i*t.h*.3,lw=t.r*(1-i*.2);X.fillStyle=['#1a5a1a','#1d6a1d','#208020'][i];X.beginPath();X.moveTo(t.x,ly-t.h*.3);X.lineTo(t.x-lw,ly+5);X.lineTo(t.x+lw,ly+5);X.closePath();X.fill();X.strokeStyle='rgba(0,0,0,.1)';X.lineWidth=1;X.stroke()}
  }else if(t.type==='oak'){
    X.fillStyle='#5a4030';X.fillRect(t.x-5,t.y-5,10,t.h*.35);
    X.strokeStyle='#5a4030';X.lineWidth=3;X.beginPath();X.moveTo(t.x,t.y-5);X.lineTo(t.x-t.r*.5,t.y-t.h*.4);X.stroke();X.beginPath();X.moveTo(t.x,t.y-8);X.lineTo(t.x+t.r*.5,t.y-t.h*.45);X.stroke();
    for(let i=0;i<5;i++){let fx=t.x+(Math.sin(i*1.7))*t.r*.4,fy=t.y-t.h*.35+(Math.cos(i*2.3))*t.r*.3;X.fillStyle=['#2a6a2a','#3a7a3a','#2d6d2d'][i%3];X.beginPath();X.arc(fx,fy,t.r*.4,0,Math.PI*2);X.fill()}
  }else{
    X.strokeStyle='#4a3a2a';X.lineWidth=4;X.lineCap='round';X.beginPath();X.moveTo(t.x,t.y+5);X.lineTo(t.x-2,t.y-t.h*.6);X.stroke();
    X.lineWidth=2;X.beginPath();X.moveTo(t.x-1,t.y-t.h*.3);X.lineTo(t.x-t.r,t.y-t.h*.5);X.stroke();
    X.beginPath();X.moveTo(t.x,t.y-t.h*.45);X.lineTo(t.x+t.r*.8,t.y-t.h*.6);X.stroke();
    X.beginPath();X.moveTo(t.x-2,t.y-t.h*.55);X.lineTo(t.x-t.r*.6,t.y-t.h*.75);X.stroke();
  }
}

function drawNPC(n,nc){

  X.fillStyle='rgba(0,0,0,.3)';X.beginPath();X.ellipse(n.x,n.y+n.r*.8,n.r*.8,n.r*.3,0,0,Math.PI*2);X.fill();

  let g=X.createRadialGradient(n.x-n.r*.3,n.y-n.r*.3,0,n.x,n.y,n.r);g.addColorStop(0,'rgba(255,255,255,.3)');g.addColorStop(1,'rgba(0,0,0,.3)');X.fillStyle=g;X.beginPath();X.arc(n.x,n.y,n.r,0,Math.PI*2);X.fill();
  X.strokeStyle='rgba(255,255,255,.5)';X.lineWidth=2;X.beginPath();X.arc(n.x,n.y,n.r,0,Math.PI*2);X.stroke();
  X.save();X.translate(n.x,n.y);X.rotate(n.ang);
  X.fillStyle='#333';X.beginPath();X.arc(0,0,n.r*.45,0,Math.PI*2);X.fill();
  let bl=n.t==='sniper'?n.r*1.6:n.t==='shotgunner'?n.r:n.t==='melee'?n.r*.8:n.r*1.2;
  X.fillStyle='#555';X.fillRect(n.r*.3,-3,bl,6);X.fillStyle='#333';X.fillRect(n.r*.3,-4,6,8);
  if(n.ft>n.fr-4){X.fillStyle='#ff0';X.shadowBlur=12;X.shadowColor='#ff0';X.beginPath();X.arc(n.r*.3+bl+3,0,4+Math.random()*3,0,Math.PI*2);X.fill();X.shadowBlur=0}
  X.restore();
  if(n.t==='healer'||n.t==='freezer'){X.strokeStyle=n.t==='healer'?'rgba(100,255,100,.15)':'rgba(100,200,255,.15)';X.lineWidth=1.5;X.setLineDash([6,6]);X.beginPath();X.arc(n.x,n.y,n.rng,0,Math.PI*2);X.stroke();X.setLineDash([])}

}

function drawZombie(z){
  let hit=z.ht>0,bob=Math.sin(z.walk)*2;
  let sk=z.t==='ghost'?'#99a':z.t==='tank'?'#776':z.t==='fast'?'#b5b':z.t==='spitter'?'#b96':z.t==='exploder'?'#b55':z.t==='armored'?'#999':z.t==='swarm'?'#ab7':z.t==='boss'?'#c33':'#5b5';
  X.globalAlpha=z.gh?.45:1;
  X.fillStyle='rgba(0,0,0,.3)';X.beginPath();X.ellipse(z.x,z.y+z.r*.85,z.r*.8,z.r*.3,0,0,Math.PI*2);X.fill();

  X.strokeStyle=hit?'#fff':sk;X.lineWidth=z.r*.22;X.lineCap='round';
  let armR=z.r*.9,armW=Math.sin(z.walk*.7)*.15;
  X.beginPath();X.moveTo(z.x+Math.cos(z.ang+.5)*z.r*.4,z.y+Math.sin(z.ang+.5)*z.r*.4+bob);X.lineTo(z.x+Math.cos(z.ang+.3+armW)*armR,z.y+Math.sin(z.ang+.3+armW)*armR+bob);X.stroke();
  X.beginPath();X.moveTo(z.x+Math.cos(z.ang-.5)*z.r*.4,z.y+Math.sin(z.ang-.5)*z.r*.4+bob);X.lineTo(z.x+Math.cos(z.ang-.3-armW)*armR,z.y+Math.sin(z.ang-.3-armW)*armR+bob);X.stroke();
  X.fillStyle=hit?'#fff':z.c;X.beginPath();X.arc(z.x,z.y+bob,z.r,0,Math.PI*2);X.fill();
  let gr=X.createRadialGradient(z.x-z.r*.3,z.y-z.r*.3+bob,0,z.x,z.y+bob,z.r);gr.addColorStop(0,'rgba(255,255,255,.15)');gr.addColorStop(1,'rgba(0,0,0,.3)');X.fillStyle=gr;X.beginPath();X.arc(z.x,z.y+bob,z.r,0,Math.PI*2);X.fill();
  X.strokeStyle='rgba(0,0,0,.5)';X.lineWidth=2;X.beginPath();X.arc(z.x,z.y+bob,z.r,0,Math.PI*2);X.stroke();
  if(!z.gh){X.fillStyle='rgba(70,55,35,.3)';X.save();X.translate(z.x,z.y+bob);X.rotate(z.ang);X.fillRect(-z.r*.35,-z.r*.15,z.r*.7,z.r*.35);X.restore()}
  let hx=z.x+Math.cos(z.ang)*z.r*.2,hy=z.y+Math.sin(z.ang)*z.r*.2+bob,hR=z.r*.5;
  X.fillStyle=hit?'#fff':sk;X.beginPath();X.arc(hx,hy,hR,0,Math.PI*2);X.fill();X.strokeStyle='rgba(0,0,0,.3)';X.lineWidth=1.5;X.stroke();
  X.shadowBlur=10;X.shadowColor='#f00';X.fillStyle='#f00';let eS=z.t==='boss'?4.5:2.5;
  X.beginPath();X.arc(hx+Math.cos(z.ang-.4)*hR*.5,hy+Math.sin(z.ang-.4)*hR*.5,eS,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(hx+Math.cos(z.ang+.4)*hR*.5,hy+Math.sin(z.ang+.4)*hR*.5,eS,0,Math.PI*2);X.fill();X.shadowBlur=0;
  X.strokeStyle='#400';X.lineWidth=1.5;X.beginPath();X.arc(hx+Math.cos(z.ang)*hR*.5,hy+Math.sin(z.ang)*hR*.5,hR*.25,z.ang-.5,z.ang+.5);X.stroke();
  if(z.t==='boss'){X.fillStyle='#ff0';X.save();X.translate(hx,hy);X.rotate(z.ang);X.beginPath();X.moveTo(-hR*.5,-hR*.6);X.lineTo(-hR*.3,-hR*1.3);X.lineTo(-hR*.1,-hR*.7);X.fill();X.beginPath();X.moveTo(hR*.5,-hR*.6);X.lineTo(hR*.3,-hR*1.3);X.lineTo(hR*.1,-hR*.7);X.fill();X.restore()}
  if(z.t==='tank'){X.strokeStyle='rgba(0,0,0,.3)';X.lineWidth=4;X.beginPath();X.arc(z.x,z.y+bob,z.r*.7,z.ang+.5,z.ang+2.5);X.stroke()}
  if(z.t==='armored'){X.strokeStyle='#aaa';X.lineWidth=3;X.beginPath();X.arc(z.x,z.y+bob,z.r*.8,z.ang+.7,z.ang+2.4);X.stroke();X.beginPath();X.arc(z.x,z.y+bob,z.r*.8,z.ang-.7,z.ang-2.4);X.stroke()}
  if(z.t==='exploder'){let pulse=Math.sin(Date.now()/150)*5;X.shadowBlur=12+pulse;X.shadowColor='#f80';X.strokeStyle='rgba(255,128,0,.6)';X.lineWidth=2;X.beginPath();X.arc(z.x,z.y+bob,z.r+3+pulse/2,0,Math.PI*2);X.stroke();X.shadowBlur=0}
  if(z.t==='spitter'){X.fillStyle='#8f4';X.shadowBlur=6;X.shadowColor='#8f4';X.beginPath();X.arc(hx+Math.cos(z.ang)*hR*.8,hy+Math.sin(z.ang)*hR*.8,3,0,Math.PI*2);X.fill();X.shadowBlur=0}
  if(z.sl>0){X.strokeStyle='rgba(100,200,255,.5)';X.lineWidth=2;X.beginPath();X.arc(z.x,z.y+bob,z.r+5,0,Math.PI*2);X.stroke()}
  X.globalAlpha=1;
  if(z.hp<z.mhp){let bw=z.r*2;X.fillStyle='rgba(0,0,0,.6)';X.fillRect(z.x-bw/2-1,z.y-z.r-14,bw+2,6);X.fillStyle='#300';X.fillRect(z.x-bw/2,z.y-z.r-13,bw,4);X.fillStyle=z.hp/z.mhp>.5?'#e33':'#f80';X.fillRect(z.x-bw/2,z.y-z.r-13,bw*(z.hp/z.mhp),4)}
  if(z.t==='boss'){X.fillStyle='#ff0';X.font='bold 12px Arial';X.textAlign='center';X.fillText('💀 BOSS',z.x,z.y+z.r+16)}
}

function drawPlayer(){
  let p=P,bob=Math.sin(p.walk)*2;
  // Shield effect
  if(shieldTimer>0){X.strokeStyle=`rgba(100,170,255,${.2+Math.sin(Date.now()/200)*.1})`;X.lineWidth=3;X.beginPath();X.arc(p.x,p.y,p.r+8,0,Math.PI*2);X.stroke()}
  X.fillStyle='rgba(0,0,0,.4)';X.beginPath();X.ellipse(p.x,p.y+p.r*.85,p.r*.85,p.r*.35,0,0,Math.PI*2);X.fill();
  let ls=Math.sin(p.walk)*7;
  X.fillStyle='#1a3a5a';
  X.beginPath();X.arc(p.x+Math.cos(p.ang+2.5)*7+Math.cos(p.ang)*ls,p.y+Math.sin(p.ang+2.5)*7+Math.sin(p.ang)*ls+bob,5.5,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(p.x+Math.cos(p.ang-2.5)*7-Math.cos(p.ang)*ls,p.y+Math.sin(p.ang-2.5)*7-Math.sin(p.ang)*ls+bob,5.5,0,Math.PI*2);X.fill();
  X.fillStyle='#332211';
  X.beginPath();X.arc(p.x+Math.cos(p.ang+2.5)*7+Math.cos(p.ang)*(ls+3),p.y+Math.sin(p.ang+2.5)*7+Math.sin(p.ang)*(ls+3)+bob,3.5,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(p.x+Math.cos(p.ang-2.5)*7-Math.cos(p.ang)*(ls+3),p.y+Math.sin(p.ang-2.5)*7-Math.sin(p.ang)*(ls+3)+bob,3.5,0,Math.PI*2);X.fill();
  X.fillStyle='#2277bb';X.beginPath();X.arc(p.x,p.y+bob,p.r,0,Math.PI*2);X.fill();
  let pg=X.createRadialGradient(p.x-5,p.y-5+bob,0,p.x,p.y+bob,p.r);pg.addColorStop(0,'rgba(100,180,255,.4)');pg.addColorStop(1,'rgba(0,50,100,.5)');X.fillStyle=pg;X.beginPath();X.arc(p.x,p.y+bob,p.r,0,Math.PI*2);X.fill();
  X.save();X.translate(p.x,p.y+bob);X.rotate(p.ang);X.fillStyle='#1a5a8a';X.fillRect(-7,-9,14,13);X.strokeStyle='#0d4070';X.lineWidth=1;X.strokeRect(-7,-9,14,13);X.fillStyle='#443322';X.fillRect(-8,2,16,3);X.restore();
  X.strokeStyle='#fff';X.lineWidth=2.5;X.beginPath();X.arc(p.x,p.y+bob,p.r,0,Math.PI*2);X.stroke();
  let hx=p.x+Math.cos(p.ang)*4,hy=p.y+Math.sin(p.ang)*4+bob;
  X.fillStyle='#f0d0a0';X.beginPath();X.arc(hx,hy,9,0,Math.PI*2);X.fill();X.strokeStyle='#d0b080';X.lineWidth=1.5;X.stroke();
  X.save();X.translate(hx,hy);X.rotate(p.ang);X.fillStyle='#3a4a3a';X.beginPath();X.arc(0,-1,10.5,Math.PI+.3,-.3);X.fill();X.fillStyle='#2a3a2a';X.fillRect(-11,-1,22,3);X.restore();
  let ex=Math.cos(p.ang)*3.5,ey=Math.sin(p.ang)*3.5;
  X.fillStyle='#fff';X.beginPath();X.arc(hx+ex-2.5,hy+ey-1.5,2.2,0,Math.PI*2);X.fill();X.beginPath();X.arc(hx+ex+2.5,hy+ey-1.5,2.2,0,Math.PI*2);X.fill();
  X.fillStyle='#222';X.beginPath();X.arc(hx+ex-2.5+Math.cos(p.ang)*.8,hy+ey-1.5+Math.sin(p.ang)*.8,1.1,0,Math.PI*2);X.fill();X.beginPath();X.arc(hx+ex+2.5+Math.cos(p.ang)*.8,hy+ey-1.5+Math.sin(p.ang)*.8,1.1,0,Math.PI*2);X.fill();
  X.save();X.translate(p.x,p.y+bob);X.rotate(p.ang);
  X.fillStyle='#f0d0a0';X.fillRect(8,-3,7,3.5);X.fillRect(11,3,5,3.5);
  let wL=p.weapon==='shotgun'?28:p.weapon==='rifle'?34:p.weapon==='sniper'?40:p.weapon==='minigun'?26:22;
  let wW=p.weapon==='shotgun'?7:p.weapon==='minigun'?8:p.weapon==='sniper'?4:5;
  X.fillStyle='#555';X.fillRect(13,-wW/2,wL,wW);X.fillStyle='#333';X.fillRect(13,-wW/2-1,7,wW+2);X.fillStyle='#444';X.fillRect(13+wL-5,-wW/2+1,7,wW-2);X.fillStyle='#666';X.fillRect(13+wL,-1.5,3,3);
  if(p.weapon==='minigun'){X.fillStyle='#444';X.fillRect(13,-wW/2-3,wL*.7,2);X.fillRect(13,wW/2+1,wL*.7,2)}
  if(P.ft>P.wpn[P.weapon].fr-3){X.fillStyle='#ff0';X.shadowBlur=15;X.shadowColor='#ff0';X.beginPath();X.arc(13+wL+4,0,4+Math.random()*3,0,Math.PI*2);X.fill();X.shadowBlur=0}
  X.restore();
  let pb=36;X.fillStyle='rgba(0,0,0,.6)';X.fillRect(p.x-pb/2-1,p.y-p.r-16,pb+2,7);X.fillStyle='#300';X.fillRect(p.x-pb/2,p.y-p.r-15,pb,5);
  let ph=P.hp/P.mhp;X.fillStyle=ph>.6?'#0f0':ph>.3?'#ff0':'#f00';X.fillRect(p.x-pb/2,p.y-p.r-15,pb*ph,5);
}

function loop(){if(started){update();draw()}requestAnimationFrame(loop)}
function startGame(){
  if(ACtx&&ACtx.state==='suspended')ACtx.resume();
  document.getElementById('menu').style.display='none';
  document.getElementById('hud').style.display='block';
  document.getElementById('minimap-wrap').style.display='block';
  if(mob){document.getElementById('shop').style.display='none';document.getElementById('joy').style.display='block';document.getElementById('mbtn').style.display='flex'}
  else document.getElementById('shop').style.display='block';
  genWorld();started=true;running=true;waveT=300;notify('Willkommen bei ZOMBIE DEFENSE!','#4f4');
}
function toggleShop(){let s=document.getElementById('shop');s.style.display=s.style.display==='none'?'block':'none'}
function restart(){
  P.x=BX;P.y=BY;P.hp=100;P.mhp=100;P.money=50;P.spd=3.5;P.regen=0;P.walk=0;shieldTimer=0;P.weapon='pistol';
  P.wpn.pistol.dmg=15;P.wpn.pistol.fr=12;P.wpn.pistol.rng=300;
  P.wpn.rifle.dmg=10;P.wpn.rifle.fr=5;P.wpn.rifle.rng=400;
  P.wpn.shotgun.dmg=8;P.wpn.shotgun.fr=30;P.wpn.shotgun.rng=200;
  P.wpn.sniper.dmg=50;P.wpn.sniper.fr=40;P.wpn.sniper.rng=600;
  P.wpn.minigun.dmg=6;P.wpn.minigun.fr=2;P.wpn.minigun.rng=250;
  base.hp=1000;base.mhp=1000;base.lv=1;wave=0;kills=0;waveOn=false;waveT=300;ambTimer=0;
  zom=[];npc=[];bld=[];bul=[];par=[];dmg=[];
  running=true;placing=null;document.getElementById('gameover').style.display='none';document.getElementById('placebar').style.display='none';
  genWorld();notify('Neues Spiel!','#4f4');
}
loop();
document.querySelectorAll('.shop-btn').forEach(b=>b.addEventListener('touchstart',e=>{e.stopPropagation();b.click()},{passive:true}));
document.querySelector('.menu-btn').addEventListener('touchstart',e=>{e.stopPropagation();startGame()},{passive:true});
</script>
